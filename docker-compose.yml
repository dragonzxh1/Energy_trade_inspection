services:
  postgres:
    image: postgres:16
    container_name: eti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: energy_trade_inspection
      POSTGRES_USER: eti
      POSTGRES_PASSWORD: eti_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eti -d energy_trade_inspection']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
